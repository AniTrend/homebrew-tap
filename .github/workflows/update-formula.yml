# Automated stackctl formula update workflow
#
# Supports:
#   1. workflow_dispatch  - manually trigger with a version tag (e.g. v0.1.0)
#   2. repository_dispatch - triggered by AniTrend/stackctl release workflow
#      when a new release is published (event type: stackctl-release)
#
# Token requirements:
#   This workflow needs read access to AniTrend/stackctl releases (cross-repo) and
#   write access to create branches/PRs on this repository. A GitHub App token is
#   used via actions/create-github-app-token@v3, requiring APP_ID and APP_PRIVATE_KEY
#   secrets. The App must be installed on both AniTrend/stackctl and AniTrend/homebrew-tap
#   with appropriate permissions (contents: read on stackctl, contents: write + pull-requests:
#   write on homebrew-tap).
#
# Behavior:
#   - Validates that the formula has a real version (not placeholder 0.0.0).
#   - Fetches release metadata for the given version from AniTrend/stackctl.
#   - Filters release assets to the 4 expected platform tarballs; fails if
#     the expected set is incomplete.
#   - Downloads each asset, computes SHA256.
#   - Patches Formula/stackctl.rb with new version, URLs, and checksums.
#   - Validates the updated formula (brew install + brew test).
#   - Opens a pull request on homebrew-tap.
#   - Dry-run mode validates data without opening a PR.

name: Update stackctl formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "stackctl release tag (e.g. v0.1.0)"
        required: true
        type: string
      dry-run:
        description: "Validate release data without opening a PR"
        default: false
        type: boolean

  # FIXME: Enable once release automation is stable.
  # When enabling:
  #   1. Change the job-level `if:` condition to accept repository_dispatch events.
  #   2. Add `types: [stackctl-release]` to match the release workflow payload.
  repository_dispatch:
    types: [stackctl-release]

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

env:
  HOMEBREW_NO_ENV_HINTS: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  update-formula:
    name: Update formula to ${{ inputs.version || github.event.client_payload.version }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'

    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: AniTrend
          repositories: stackctl,homebrew-tap

      - name: Validate version input
        run: |
          VERSION="${{ inputs.version || github.event.client_payload.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be a semver tag with v prefix (e.g. v0.1.0)"
            echo "Note: Pre-release tags (e.g. v0.1.0-alpha.1) are not currently supported."
            exit 1
          fi
          echo "VERSION=${{ inputs.version || github.event.client_payload.version }}" >> "$GITHUB_ENV"
          echo "DRY_RUN=${{ inputs.dry-run || 'false' }}" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c

      - name: Verify formula is not placeholder
        run: |
          VERSION=$(grep -E '^[[:space:]]*version[[:space:]]' Formula/stackctl.rb | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" = "0.0.0" ]; then
            echo "Error: Formula/stackctl.rb still uses placeholder version 0.0.0."
            echo "This workflow requires a real formula with actual release URLs."
            echo ""
            echo "Fix: Replace the placeholder version, URLs, and SHA256s in"
            echo "Formula/stackctl.rb with values from the first stackctl release,"
            echo "or merge the formula PR that delivers real values first."
            exit 1
          fi
          echo "Formula version: $VERSION (OK)"

      - name: Fetch release metadata
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RELEASE_JSON=$(gh release view "${{ inputs.version || github.event.client_payload.version }}" \
            --repo AniTrend/stackctl \
            --json tagName,assets,body 2>/dev/null || true)

          if [ -z "$RELEASE_JSON" ] || [ "$RELEASE_JSON" = "null" ]; then
            echo "Error: Release ${{ inputs.version || github.event.client_payload.version }} not found in AniTrend/stackctl"
            echo ""
            echo "Available releases:"
            gh release list --repo AniTrend/stackctl --limit 10 2>/dev/null || echo "(none)"
            exit 1
          fi

          echo "RELEASE_JSON=$(echo "$RELEASE_JSON" | jq -c .)" >> "$GITHUB_ENV"

      - name: Filter and validate release assets
        id: assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ inputs.version || github.event.client_payload.version }}"
          VERSION_NUM="${VERSION#v}"

          # Expected platform tarballs
          EXPECTED_ARCHS=(
            "x86_64-apple-darwin"
            "aarch64-apple-darwin"
            "x86_64-unknown-linux-gnu"
            "aarch64-unknown-linux-gnu"
          )

          # Get all tarball assets from the release
          ALL_TARBALLS=$(echo "$RELEASE_JSON" | jq -r \
            '.assets[] | select(.name | endswith(".tar.gz")) | .name')

          if [ -z "$ALL_TARBALLS" ]; then
            echo "Error: No .tar.gz assets found in release $VERSION"
            echo "Release assets:"
            echo "$RELEASE_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "Available tarballs:"
          echo "$ALL_TARBALLS"

          # Validate all 4 expected assets are present
          MISSING=false
          for ARCH in "${EXPECTED_ARCHS[@]}"; do
            EXPECTED_NAME="stackctl-${VERSION_NUM}-${ARCH}.tar.gz"
            if ! echo "$ALL_TARBALLS" | grep -qF "$EXPECTED_NAME"; then
              echo "ERROR: Missing expected asset: $EXPECTED_NAME"
              MISSING=true
            fi
          done

          if [ "$MISSING" = true ]; then
            echo ""
            echo "Not all expected platform tarballs are present."
            echo "Expected archs: ${EXPECTED_ARCHS[*]}"
            exit 1
          fi

          # Download and checksum only the expected tarballs
          ASSETS_DIR=$(mktemp -d)

          UPDATES="["
          FIRST=true
          for ARCH in "${EXPECTED_ARCHS[@]}"; do
            ASSET="stackctl-${VERSION_NUM}-${ARCH}.tar.gz"

            gh release download "$VERSION" \
              --repo AniTrend/stackctl \
              --pattern "$ASSET" \
              --dir "$ASSETS_DIR"

            SHA=$(sha256sum "$ASSETS_DIR/$ASSET" | cut -d' ' -f1)

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              UPDATES+=","
            fi

            UPDATES+=$(jq -n \
              --arg name "$ASSET" \
              --arg sha "$SHA" \
              --arg url "https://github.com/AniTrend/stackctl/releases/download/$VERSION/$ASSET" \
              '{asset: $name, sha256: $sha, url: $url}')
          done

          UPDATES+="]"
          echo "UPDATES=$UPDATES" >> "$GITHUB_ENV"

          echo ""
          echo "=== Asset SHA256 Checksums ==="
          echo "$UPDATES" | jq -r '.[] | "\(.asset): \(.sha256)"'

      - name: Patch formula
        run: |
          FORMULA="Formula/stackctl.rb"
          VERSION_NUM="${VERSION#v}"

          echo "=== Before patch ==="
          head -5 "$FORMULA"

          # Update version line
          sed -i "s/^version \".*\"/version \"$VERSION_NUM\"/" "$FORMULA"

          # For each platform asset, patch URL and SHA256 by matching the
          # target triple in the asset name with the formula's URL patterns.
          echo "$UPDATES" | jq -c '.[]' | while IFS= read -r ASSET; do
            ASSET_NAME=$(echo "$ASSET" | jq -r '.asset')
            SHA=$(echo "$ASSET" | jq -r '.sha256')
            URL=$(echo "$ASSET" | jq -r '.url')

            echo "Patching: $ASSET_NAME"

            TARGET=$(echo "$ASSET_NAME" | sed "s/^stackctl-v[0-9.]*-//" | sed 's/\.tar\.gz$//')
            ESCAPED_TARGET=$(echo "$TARGET" | sed 's/[.]/\\./g')

            # Patch URL line containing this target
            sed -i "/${ESCAPED_TARGET}\.tar\.gz/s|url \".*\"|url \"$URL\"|" "$FORMULA"

            # Patch sha256 on the line following the matching URL
            sed -i "/${ESCAPED_TARGET}\.tar\.gz/,/sha256/ s/sha256 \"[^\"]*\"/sha256 \"$SHA\"/" "$FORMULA"
          done

          echo ""
          echo "=== After patch ==="
          grep -E "^(version|  url|  sha256)" "$FORMULA"

      - name: Validate updated formula
        id: validate
        run: |
          echo "Running brew style..."
          brew style Formula/stackctl.rb

          echo ""
          echo "Running brew audit..."
          brew audit --strict --online stackctl

          echo ""
          echo "Running brew install..."
          brew install --formula Formula/stackctl.rb

          echo ""
          echo "Running brew test..."
          brew test stackctl

      - name: Create pull request
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ inputs.version || github.event.client_payload.version }}"
          BRANCH="ci/update-stackctl-formula-v${VERSION#v}"

          git config user.name "AniTrend Bot"
          git config user.email "anitrendapp@gmail.com"

          git checkout -b "$BRANCH"
          git add Formula/stackctl.rb
          git commit -m "ci(stackctl): update formula to ${VERSION}"

          git push origin "$BRANCH"

          # Build PR body
          BODY=$(printf '## Automated formula update\n\n')
          BODY="${BODY}$(printf 'Updates stackctl formula to **%s**.\n\n' "${VERSION}")"
          BODY="${BODY}$(printf '### Release assets\n\n')"
          BODY="${BODY}$(printf '```\n')"
          BODY="${BODY}$(echo "$UPDATES" | jq -r '.[] | "\(.asset): \(.sha256)"')"
          BODY="${BODY}$(printf '\n```\n\n')"
          BODY="${BODY}$(printf '### Validation\n\n')"
          BODY="${BODY}$(printf -- '- brew style: passed\n')"
          BODY="${BODY}$(printf -- '- brew audit: completed\n')"
          BODY="${BODY}$(printf -- '- brew install: completed\n')"
          BODY="${BODY}$(printf -- '- brew test: completed\n')"

          gh pr create \
            --repo AniTrend/homebrew-tap \
            --base main \
            --head "$BRANCH" \
            --title "ci(stackctl): update formula to ${VERSION}" \
            --body "$BODY"

      - name: Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "=== DRY RUN - No PR created ==="
          echo "Version: ${{ inputs.version || github.event.client_payload.version }}"
          echo "Assets:"
          echo "$UPDATES" | jq -r '.[] | "  \(.asset): \(.sha256)"'
          echo ""
          echo "Formula would be patched and PR would be opened."

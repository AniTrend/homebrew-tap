# CI workflow for Homebrew formula validation
#
# Triggers:
#   - Pull requests and pushes to main (path-filtered)
#   - workflow_dispatch with optional perform-install flag
#
# Jobs:
#   lint      — Ruby syntax/style check (always runs)
#   audit     — brew audit (non-blocking for placeholder, blocking for real versions)
#   install   — brew install + test (conditional, requires perform-install=true)
#
# Docs-only changes (README.md, CONTRIBUTING.md, etc.) skip all formula jobs.

name: CI

on:
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      perform-install:
        description: "Run brew install + brew test"
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  HOMEBREW_NO_ENV_HINTS: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_DEVELOPER: 1

jobs:
  lint:
    name: Ruby style check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c

      - name: Run brew style
        run: |
          brew style Formula/

  audit:
    name: Formula audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c

      - name: Tap self (required for brew audit)
        run: |
          brew untap AniTrend/tap 2>/dev/null || true
          brew tap --force AniTrend/tap "${{ github.workspace }}"
          brew trust AniTrend/tap

      - name: Detect placeholder version
        id: version-check
        run: |
          VERSION=$(grep -E '^[[:space:]]*version[[:space:]]' Formula/stackctl.rb | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" = "0.0.0" ]; then
            echo "placeholder=true" >> "$GITHUB_OUTPUT"
          else
            echo "placeholder=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run brew audit
        env:
          IS_PLACEHOLDER: ${{ steps.version-check.outputs.placeholder }}
        run: |
          set +o pipefail
          brew audit --strict --online stackctl 2>&1 \
            | tee "${{ runner.temp }}/brew-audit.log"
          set -o pipefail
          # Skip exit code check for placeholder versions (0.0.0).
          # For real versions, audit failures are blocking.
          if [ "${IS_PLACEHOLDER}" = "true" ]; then
            echo "Audit completed (placeholder — non-blocking)"
            exit 0
          fi

      - name: Upload audit log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-log
          path: "${{ runner.temp }}/brew-audit.log"
          retention-days: 7

      - name: Clean up local tap
        if: always()
        run: |
          brew untap AniTrend/tap 2>/dev/null || true
          rm -rf "$(brew --prefix)/Homebrew/Library/Taps/anitrend" 2>/dev/null || true

  install:
    name: Install and test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.perform-install == true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c

      - name: Tap self
        run: |
          brew untap AniTrend/tap 2>/dev/null || true
          brew tap --force AniTrend/tap "${{ github.workspace }}"
          brew trust AniTrend/tap

      - name: Install formula
        run: |
          brew install --formula Formula/stackctl.rb

      - name: Test formula
        run: |
          brew test stackctl

      - name: Clean up local tap
        if: always()
        run: |
          brew untap AniTrend/tap 2>/dev/null || true
          rm -rf "$(brew --prefix)/Homebrew/Library/Taps/anitrend" 2>/dev/null || true

